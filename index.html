<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slay – Artist Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

.hero {
  height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to bottom, #000, #1a1a1a);
  text-align: center;
}

.hero h1 {
  font-size: 4rem;
  margin: 0;
  letter-spacing: 5px;
}

.hero p {
  font-size: 1.2rem;
  opacity: 0.8;
}

.section {
  padding: 60px 20px;
  max-width: 1200px;
  margin: auto;
}

.section h2 {
  font-size: 2rem;
  margin-bottom: 30px;
  border-bottom: 2px solid white;
  display: inline-block;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.gallery img {
  width: 100%;
  transition: 0.3s;
  cursor: pointer;
}

.gallery img:hover {
  transform: scale(1.05);
}

footer {
  text-align: center;
  padding: 40px 20px;
  background: #000;
}

a {
  color: #ff4d6d;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="hero">
  <h1>SLAY</h1>
  <p>Visual Artist</p>
</div>

<div class="section">
  <h2>About</h2>
  <p>
    Slay is a visual artist exploring emotion, color and atmosphere.
    This space presents selected works and artistic expressions.
  </p>
</div>

<div class="section">
  <h2>Works</h2>
  <div class="gallery">
    <img src="images/festmeny1.jpg" alt="Artwork 1">
    <img src="images/festmeny2.jpg" alt="Artwork 2">
    <img src="images/festmeny3.jpg" alt="Artwork 3">
  </div>
</div>

<footer>
  <p>
    Instagram:
    <a href="https://instagram.com/szalay_szili" target="_blank">
      @szalay_szili
    </a>
  </p>
  <p>© 2026 Slay</p>
</footer>

</body>
</html>
